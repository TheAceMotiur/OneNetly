server {
  listen 80;
  listen [::]:80;
  listen 443 quic;
  listen 443 ssl;
  listen [::]:443 quic;
  listen [::]:443 ssl;
  http2 on;
  http3 off;
  {{ssl_certificate_key}}
  {{ssl_certificate}}
  server_name onenetly.com www1.onenetly.com;
  {{root}}

  {{nginx_access_log}}
  {{nginx_error_log}}

  if ($scheme != "https") {
    rewrite ^ https://$host$request_uri permanent;
  }

  location ~ /.well-known {
    auth_basic off;
    allow all;
  }

  {{settings}}
  
  # Allow 5GB file uploads
  client_max_body_size 5120M;

  include /etc/nginx/global_settings;

  location / {
    {{varnish_proxy_pass}}
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_hide_header X-Varnish;
    proxy_redirect off;
    proxy_max_temp_file_size 0;
    proxy_connect_timeout      7200;
    proxy_send_timeout         7200;
    proxy_read_timeout         7200;
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    proxy_temp_file_write_size 256k;
  }

  location ~* ^.+\.(css|js|jpg|jpeg|gif|png|ico|gz|svg|svgz|ttf|otf|woff|woff2|eot|mp4|ogg|ogv|webm|webp|zip|swf|map)$ {
    add_header Access-Control-Allow-Origin "*";
    add_header alt-svc 'h3=":443"; ma=86400';
    expires max;
    access_log off;
  }

  if (-f $request_filename) {
    break;
  }
}

server {
  listen 8080;
  listen [::]:8080;
  server_name onenetly.com www1.onenetly.com;
  {{root}}

  index index.php index.html;
  
  # Allow 5GB file uploads
  client_max_body_size 5120M;

  # Path-based download URLs: /download/ID -> /download.php?id=ID
  location ~ ^/download/([a-zA-Z0-9]+)$ {
    rewrite ^/download/(.*)$ /download.php?id=$1 last;
  }

  # Path-based stream URLs: /stream/ID -> /stream.php?id=ID  
  location ~ ^/stream/([a-zA-Z0-9]+)$ {
    rewrite ^/stream/(.*)$ /stream.php?id=$1 last;
  }

  # API endpoints (clean URLs with CORS support)
  location ~ ^/api/v1/(upload|file) {
    # Add CORS headers for cross-origin requests
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key, Authorization' always;
    add_header 'Access-Control-Max-Age' '3600' always;
    
    # Handle OPTIONS preflight
    if ($request_method = 'OPTIONS') {
      return 204;
    }
    
    # Rewrite rules
    rewrite ^/api/v1/upload$ /api/v1/upload.php last;
    rewrite ^/api/v1/file$ /api/v1/file.php last;
  }

  location ~ "^/api/v1/file/([a-f0-9]{12})$" {
    # Add CORS headers
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key, Authorization' always;
    
    if ($request_method = 'OPTIONS') {
      return 204;
    }
    
    rewrite "^/api/v1/file/([a-f0-9]{12})$" /api/v1/file.php?id=$1 last;
  }

  # Block direct web access to the database folder
  location ^~ /database/ {
    deny all;
    return 403;
  }

  # Block direct access to sensitive PHP files
  location ~* ^/(config|drive_api|configuration|database|api_auth)\.php$ {
    deny all;
    return 403;
  }

  # Main location block with extensionless PHP support
  location / {
    try_files $uri $uri/ @extensionless-php;
  }

  # Handle extensionless PHP URLs
  location @extensionless-php {
    rewrite ^(.*)$ $1.php last;
  }

  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_intercept_errors on;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    try_files $uri =404;
    fastcgi_read_timeout 7200;
    fastcgi_send_timeout 7200;
    fastcgi_connect_timeout 7200;
    fastcgi_param HTTPS "on";
    fastcgi_param SERVER_PORT 443;
    fastcgi_pass 127.0.0.1:{{php_fpm_port}};
    fastcgi_param PHP_VALUE "{{php_settings}}";
  }

  location ~* ^.+\.(css|js|jpg|jpeg|gif|png|ico|gz|svg|svgz|ttf|otf|woff|woff2|eot|mp4|ogg|ogv|webm|webp|zip|swf|map)$ {
    add_header Access-Control-Allow-Origin "*";
    expires max;
    access_log off;
  }

  if (-f $request_filename) {
    break;
  }
}